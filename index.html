<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sathsara Electric | Official Site</title>
    <style>
        :root {
            --primary-blue: #00d4ff;
            --dark-bg: #0a0b10;
            --card-bg: rgba(20, 22, 30, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* පසුබිමට පරිපථ රටාවක් (Circuit Pattern) එක් කිරීම */
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(0, 212, 255, 0.15) 1px, transparent 0);
            background-size: 30px 30px;
            overflow-x: hidden;
        }

        /* පරිපථ රේඛා වැනි අලංකරණයක් */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,212,255,0.05) 1px, transparent 1px) 0 0,
                        linear-gradient(rgba(0,212,255,0.05) 1px, transparent 1px) 0 0;
            background-size: 100px 100px;
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .logo-area {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-blue), #0055ff);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            font-weight: bold;
            box-shadow: 0 0 20px var(--primary-blue);
        }

        h1 {
            margin: 10px 0;
            font-size: 28px;
            letter-spacing: 1px;
            color: var(--primary-blue);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .tagline {
            font-size: 14px;
            color: #ccc;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 30px;
        }

        .service-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .contact-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .btn-whatsapp {
            background-color: #25d366;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-email {
            background-color: #ea4335;
            box-shadow: 0 4px 15px rgba(234, 67, 53, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">SE</div>
    <h1>Sathsara Electric</h1>
    <p class="tagline">CCTV camera සවිකිරීම, Graphic Design, Logo Design සහ QR Code නිර්මාණය ඇතුළු සියලුම තාක්ෂණික සේවාවන් විශ්වාසනීයව ලබාගන්න.</p>
    
    <div class="services-grid">
        <div class="service-item">📹 CCTV Installation</div>
        <div class="service-item">🎨 Graphic Design</div>
        <div class="service-item">🖋️ Logo Design</div>
        <div class="service-item">🔳 QR Code Make</div>
    </div>

    <div class="contact-btns">
        <a href="https://wa.me/94741527042" class="btn btn-whatsapp">WhatsApp පණිවිඩයක් එවන්න</a>
        <a href="mailto:danujasathsara312@Gmail.com" class="btn btn-email">Email පණිවිඩයක් එවන්න</a>
    </div>

    <div class="footer">
        © 2026 Sathsara Electric
    </div>
</div>

</body>
</html>
